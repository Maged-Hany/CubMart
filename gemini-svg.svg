<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="100%" height="100%">
  <defs>
    <style>
      .brand-text { font-family: 'Montserrat', 'Helvetica Neue', 'Arial', sans-serif; font-weight: 900; font-size: 40px; fill: #000000; letter-spacing: 2px; text-anchor: middle; }
      .brand-sub { font-family: 'Georgia', 'Times New Roman', serif; font-weight: 700; font-size: 19px; fill: #000000; letter-spacing: 6px; text-anchor: middle; }
      .accent-color { fill: #000000; }
    </style>
  </defs>

  <!-- Typography only (Centered Layout) -->
  <g id="logo-text">
    <text x="160" y="58" class="brand-text">CUBMART</text>
    <text x="160" y="92" class="brand-sub">SMART SHOPPING</text>
  </g>
</svg>
